services:
  db:
    image: postgres:15-alpine
    env_file:
      - .env
    container_name: blog_week3_db_container
    ports:
      - "5444:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: blog_week3_web
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  postgres_data: